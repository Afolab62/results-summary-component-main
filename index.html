<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="results.css" />

    <title>Frontend Mentor | Results summary component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="main-card">
        <div class="result-card">
          <p class="result-title">Your Result</p>
          <div class="overall-score">
            <h1>76</h1>

            <p class="max-score">of 100</p>
          </div>
          <span> Great </span>
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
        <div class="summary-card">
          <h2>Summary</h2>
          <div class="section-tabs">
            <div class="react">
              <img
                class="icons"
                src="assets/images/icon-reaction.svg"
                alt="lighting-bolt"
              />
              Reaction
              <p class="score"><b class="test-number">80</b> / 100</p>
            </div>
            <div class="memory">
              <img
                class="icons"
                src="assets/images/icon-memory.svg"
                alt="brain-icon"
              />
              Memory
              <p class="score"><b class="test-number">92</b> / 100</p>
            </div>
            <div class="verbal">
              <img
                class="icons"
                src="assets/images/icon-verbal.svg"
                alt="speech-bubble"
              />
              Verbal
              <p class="score"><b class="test-number">61</b> / 100</p>
            </div>
            <div class="visual">
              <img
                class="icons"
                src="assets/images/icon-visual.svg"
                alt="eye-icon"
              />
              Visual
              <p class="score"><b class="test-number">73</b> / 100</p>
            </div>
            <a href="#" class="continue-btn" href="#">Continue</a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
